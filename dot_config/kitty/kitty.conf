include hyde.conf

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

window_padding_width 15
window_margin_width 0
single_window_margin_width 0
allow_remote_control yes
listen_on unix:/tmp/mykitty
shell_integration enabled
# font_size 10.0

# remap to open new kitty tab in the same directory (default is home dir)
map ctrl+shift+t            new_tab_with_cwd

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
# input_delay 0
# repaint_delay 2
# sync_to_monitor no
# wayland_enable_ime no


# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
font_size        9.0
bold_font        auto
italic_font      auto
bold_italic_font auto
disable_ligatures always
# END_KITTY_FONTS
# Use Neovim to view kitty scrollback
map ctrl+shift+h kitty_scrollback_nvim

# # BEGIN_KITTY_THEME
# # Catppuccin-Mocha
# include current-theme.conf
# # END_KITTY_THEME


# # BEGIN_KITTY_THEME
# # Catppuccin-Frappe
# include current-theme.conf
# # END_KITTY_THEME


# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten /home/binaryraptor/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Browse scrollback buffer in nvim
map kitty_mod+h kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output
