# goes in ~/.config/hyde/
# Configuration file for HyDE
# Environment variables should be on top
# Updated config.toml file can be found at $HOME/.local/share/hyde/config.toml

[wallpaper] 
custom_paths = [
  "$HOME/Pictures/Wallpapers"
] #List of Paths to search for wallpapers

[hyprland]
browser = "google-chrome"
editor = "nvim"
terminal = "kitty"
explorer = "nautilus"
cursor_size=18
cursor_theme="Bibata-Modern-Ice"
icon_theme = "Tela-circle-grey"

[hyprland-start]
notifications = ''
auth_dialogue = "/usr/lib/polkit-kde-authentication-agent-1"

[weather]
location = "Madurai"

[wlogout] 
style = 1
