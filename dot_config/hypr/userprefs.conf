## Environment Variables

env = XCURSOR_SIZE,18
env = HYPRCURSOR_SIZE,18
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORM,wayland
env = SSH_AUTH_SOCK,/run/user/1000/ssh-agent.socket





## Startup Execution

exec-once = hyprpm reload -n && hyprctl dismissnotify 
exec-once = env QT_QPA_PLATFORM=wayland XCURSOR_SIZE=20 QT_SCALE_FACTOR=1
exec-once = hypridle
exec-once = bash -c 'export XCURSOR_SIZE=18'
exec-once = hyprctl setcursor Bibata-Modern-Ice 18
exec-once = udiskie &
exec-once = swaync
exec-once = gsettings set org.gnome.nautilus.icon-view default-zoom-level 'small'
exec-once = ~/.local/bin/autostart.sh
exec-once = snappy-switcher --daemon
exec-once = sh -c 'rm -f /run/user/1000/ssh-agent.socket && ssh-agent -a /run/user/1000/ssh-agent.socket'
exec-once = valent --gapplication-service
# exec-once = /usr/bin/kdeconnectd
# exec-once = hypr-kdeconnect-portal





## Input & Gestures

# Keyboard & Mouse
input {
    kb_layout = us
    kb_options = caps:escape,shift:both_capslock
    follow_mouse = 1
    sensitivity = 0
    scroll_factor = 0.5
    force_no_accel = 0
    accel_profile = flat 
    # numlock_by_default = true

    touchpad {
        natural_scroll = yes
        scroll_factor = 0.10
        disable_while_typing = true
    }
}

# Touchpad Gestures
gesture = 3, horizontal, unset
gesture = 4, vertical, workspace
gesture = 3, left, dispatcher, layoutmsg, focus l
gesture = 3, right, dispatcher, layoutmsg, focus r





## UI & Layout

# Core Layout
general {
    layout = scrolling
    gaps_in = 3
    gaps_out = 7
    border_size = 2
}

# Scrolling Layout Parameters
scrolling {
    fullscreen_on_one_column = true 
    # wrap_focus = false
    column_width = 0.7 
    direction = right 
    follow_focus = true
}

# Visuals
decoration:blur:enabled = true
decoration {
    shadow {
        enabled = false
    }
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        special = false
    }
    rounding = 6
    dim_special = 0.35
}

# Motion
animations {
    bezier = bouncy, 0.05, 0.9, 0.1, 1.1
    bezier = snappy, 0.1, 1.0, 0.1, 1.0
    animation = specialWorkspace, 1, 6, bouncy, slidefadevert 1%
    animation = workspaces, 1, 3, default, slidevert
}

# Extras
misc {
    focus_on_activate = true
}

# Plugins
plugin {
    scrolloverview {
        gesture_distance = 300
        scale = 0.6
        workspace_gap = 20
        wallpaper = 0
        blur = false
    }
}





## Window Rules

# Idle Inhibit
windowrule = idle_inhibit fullscreen, match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*brave-browser.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$|^(.*vivaldi.*)$

# Picture-in-Picture
windowrule {
    name = hyde_picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    tag = +picture-in-picture
    tag = +hyde_picture_in_picture
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.73) (monitor_h*0.72)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}

