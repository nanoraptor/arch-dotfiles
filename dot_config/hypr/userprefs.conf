# Force Overrides
# Force cursor size
env = XCURSOR_SIZE,18
env = HYPRCURSOR_SIZE,18
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORMTHEME,qt5ct
QT_QPA_PLATFORM=wayland keepassxc
#input
input {
    kb_layout = us
    # follow_mouse = 2
    kb_options = caps:escape,shift:both_capslock
    follow_mouse = 1
    sensitivity = 0
    scroll_factor = 0.5
    force_no_accel = 0
    accel_profile = flat 
    # numlock_by_default = true

    touchpad {
        natural_scroll = yes
        scroll_factor = 0.10
        disable_while_typing = true
    }
}
decoration:blur:enabled = true
decoration {
    shadow {
        enabled = false
      }
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
          special = false
    }
    rounding = 6
    dim_special = 0.35
}

animations {
    bezier = bouncy, 0.05, 0.9, 0.1, 1.1
    bezier = snappy, 0.1, 1.0, 0.1, 1.0
    animation = specialWorkspace, 1, 6, bouncy, slidefadevert 1%
    animation = workspaces, 1, 3, default, slidevert
}
# 1. Unset the default 3-finger horizontal swipe from the main config
gesture = 3, horizontal, unset

# 2. Add your 4-finger horizontal swipe for workspaces
gesture = 4, vertical, workspace

# 3. Add your specific 3-finger directional swipes for scroller columns
gesture = 3, left, dispatcher, layoutmsg, focus l
gesture = 3, right, dispatcher, layoutmsg ,focus r
general {
    layout = scrolling
    gaps_in = 3
    gaps_out = 7
    border_size = 2
}
scrolling {
    # Makes a single app take up the full screen until you open a second one
    fullscreen_on_one_column = true 
    # wrap_focus = false

    # Defines the width of a new window as a fraction of your screen (0.1 to 1.0)
    # 0.5 means new windows take up exactly half your screen
    column_width = 0.7 

    # The direction the tape scrolls as you open new windows
    # Options: right, left, up, down
    direction = right 
    follow_focus = true
}

# plugins
plugin {
    scrolloverview {
        gesture_distance = 300 # how far is the "max" for the gesture
        scale = 0.6 # preferred overview scale
        workspace_gap = 20
        wallpaper = 0 # 0: global only, 1: per-workspace only, 2: both
        blur = false # blur only the main overview wallpaper

        # shadow {
        #     enabled = false
        #     range = 50
        #     render_power = 3
        #     color = rgba(1a1a1aee)
        # }
    }
}
misc {
    focus_on_activate = true
}
