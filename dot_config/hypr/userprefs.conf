## Special Workspaces

# Media & Communication
windowrule = workspace special:spotify silent, match:class (?i)^(spotify)$ 
windowrule = workspace special:discord silent, match:class (?i)^(discord|com\.discordapp\.Discord)$ 
windowrule = workspace special:mail silent, match:class (?i)^(thunderbird|org\.mozilla\.Thunderbird)$ 

# Productivity & Devices
windowrule = workspace special:sp silent, match:class (?i)^(superproductivity(-bin)?)$ 
windowrule = workspace special:scrcpy, match:class ^(scrcpy)$

# AI Web Apps (Dynamic Tags)
windowrule = workspace special:AI, match:tag chatgpt*
windowrule = workspace special:AI silent, match:tag pai* 
windowrule = workspace special:AI silent, match:tag claude*
windowrule = workspace special:AI, match:tag perplexity*





## Layer Rules

# SwayNC / Notifications
layerrule {
    name = swaync_anim
    match:namespace = swaync-control-center
    animation = slide right
    blur = true
}
layerrule = blur true, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = blur true, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = blur true, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-notification-window

# Vicinae
layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
    no_anim = true 
}

# Waybar & Rofi & Logout
layerrule = blur true, match:namespace waybar
layerrule = ignore_alpha 0.0, match:namespace waybar
layerrule = blur true, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = blur true, match:namespace logout_dialog

# ShowMeTheKey
layerrule = blur true, match:namespace showmethekey-gtk
layerrule = ignore_alpha 0.0, match:namespace showmethekey-gtk
