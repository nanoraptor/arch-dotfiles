# Grouping of binds for easier management
#  $d=[Group Name|Subgroup Name1|Subgroup Name2|...]
# '$d' is a variable that is used to group binds together (or use another variable)
# The $d will be parsed as a separate key to be use for a GUI or something pretty
# [Main|Subgroup1|Subgroup2|...]
# Main - The main groupname
# Subgroup1.. - The subgroup names can be use to avoid repeating the same description


#*  Variables 
# Default if commented out
$mainMod = Super # super / meta / windows key
# Assign apps
$TERMINAL = kitty
$EDITOR = nvim
$SECONDARYEDITOR = code
$EXPLORER = nautilus
$BROWSER = google-chrome-stable

$wm=Window Management
$d=[$wm]
bindd = $mainMod, Q, $d close focused window, exec, $scrPath/dontkillsteam.sh
bindd = Alt, F4, $d close focused window, exec, $scrPath/dontkillsteam.sh
bindd = $mainMod, Delete, $d kill hyprland session, exit
bindd = $mainMod, W, $d toggle floating, togglefloating
bindd = $mainMod, G, $d toggle group, togglegroup
bindd = $mainMod_SHIFT, G,$d move the window out of the group, moveoutofgroup
bindd = $mainMod_CTRL, G,$d lock the current group, lockactivegroup
bindd = $mainMod, F, $d toggle fullscreen, fullscreen
# bindd = SHIFT, Print, $d toggle fullscreen, fullscreen
bindd = $mainMod, Escape, $d lock screen, exec, hyde-shell lockscreen.sh
bindd = $mainMod Shift, F, $d toggle pin on focused window, exec, $scrPath/windowpin.sh
bindd = Control Alt, Delete, $d logout menu, exec, $scrPath/logoutlaunch.sh
# bindd = $mainMod SHIFT, D, $d toggle hyperexpo, hyprexpo:expo, toggle
bindd = $mainMod SHIFT, D, $d toggle hyprspace, exec, hyprctl dispatch overview:toggle
bindd = $mainMod SHIFT, W, $d toggle floating window (centered) ,exec, hyprctl --batch "dispatch togglefloating; dispatch centerwindow"

$d=[$wm|Group Navigation]
bindd = $mainMod Control Shift, H, $d change active group backwards   , changegroupactive, b
bindd = $mainMod Control Shift, L, $d change active group forwards  , changegroupactive, f

$d=[$wm|Change focus]
bindd = $mainMod, H, $d focus left, movefocus, l
bindd = $mainMod, L, $d focus right , movefocus, r
bindd = $mainMod, K, $d focus up , movefocus, u
bindd = $mainMod, J , $d focus down, movefocus, d
# bindd = ALT, Tab,$d Cycle focus, cyclenext
bindd = $mainMod, Tab, $d Snappy Switcher Next, exec, snappy-switcher next --mod super
bindd = ALT, Tab, $d Snappy Switcher Workspace Next, exec, snappy-switcher next --workspace --mod alt

$d=[$wm|Scroller Overview]
bindd = $mainMod, D, $d workspaces preview , scrolloverview:overview, toggle
bindd = $mainMod ALT,O, $d overview of current workspace, layoutmsg, fit all
bindd = $mainMod ALT SHIFT, O, $d zoom back in, layoutmsg, fit active

# $d=[$wm|Scroller Columns]
bindd = $mainMod SHIFT, mouse_up, $d pan view right, layoutmsg, move +col
bindd = $mainMod SHIFT, mouse_down, $d pan view left, layoutmsg, move -col

$d=[$wm|Resize Active Window]
# Resize windows
bindde = $mainMod ALT, L, $d increase width , layoutmsg, colresize +0.05
bindde = $mainMod ALT, H, $d decrease width, layoutmsg, colresize -0.05
bindde = $mainMod ALT, J, $d resize window up, resizeactive, 0 -30
bindde = $mainMod ALT, K, $d resize  window down, resizeactive, 0 30
bindde = $mainMod ALT, F, $d maximize window to workspace, fullscreen, 1
bindde = $mainMod SHIFT, L, $d increase width, layoutmsg, swapcol r
bindde = $mainMod SHIFT, H, $d decrease width, layoutmsg, swapcol l

# Move active window around current workspace with mainMod + Shift + Control [←→↑↓]
$d=[$wm|Move active window across workspace]
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
bindde = $mainMod Alt_R SHIFT, H, Move active window to the left, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $mainMod Alt_R SHIFT, L, Move active window to the right, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $mainMod Alt_R SHIFT, K, Move active window up, exec, $moveactivewindow  0 -30 || hyprctl dispatch movewindow u
bindde = $mainMod Alt_R SHIFT, J, Move active window down, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d

# Move/Resize focused window
$d=[$wm|Move & Resize with mouse]
binddm = $mainMod, mouse:272, $d hold to move window, movewindow
binddm = $mainMod, mouse:273, $d hold to resize window, resizewindow
binddm = $mainMod, Z, $d hold to move window , movewindow
binddm = $mainMod, X, $d hold to resize window, resizewindow

# Toggle focused window split
$d=[$wm]

# bindd = $mainMod Shift, J, $d toggle split, togglesplit

$l=Launcher
$d=[$l|Apps]
bindd = $mainMod, return, $d terminal , exec, $TERMINAL
# bindd = $mainMod SHIFT, return, $d dropdown terminal , exec, [float; move 20% 5%; size 60% 60%] $TERMINAL
bindd = SUPER_SHIFT, return, $d floating terminal, exec, kitty --title "kitty-dropdown" #kitty-floating
bindd = SUPER_ALT, return, $d dropdown overlay terminal, exec, kitten quick-access-terminal #kitty-dropdown
bindd = SUPER, T, $d tmux, exec, kitty -o draw_minimal_borders=yes -o window_border_width=0 -o window_padding_width=8 -o hide_window_decorations=yes -e tmux new -A -s main
bindd = SUPER_SHIFT, T, $d floating tmux, exec,kitty --class floating_tmux -e tmux new -A -s main
bindd = $mainMod, E, $d file explorer , exec, $EXPLORER
bindd = $mainMod, C, $d text editor , exec, kitty --class nvim-window --override "font_family=JetBrainsMono Nerd Font" --override window_padding_width=10  --override hide_window_decorations=yes --override remember_window_size=no --override initial_window_width=1000 --override initial_window_height=600 -e nvim
bindd = $mainMod SHIFT, C, $d secondary text editor , exec, $SECONDARYEDITOR
# bindd = $mainMod, B, $d web browser , exec, $BROWSER
bindd = $mainMod, B,$d launch browser, exec, google-chrome-stable --profile-directory="Default" --new-window --disable-session-crashed-bubble
bindd = $mainMod SHIFT, B,$d launch browser (VIT Profile), exec, google-chrome-stable --profile-directory="Profile 1" --new-window --disable-session-crashed-bubble
bindd = Control Shift, Escape, $d system monitor , exec, kitty --class clipse -e btop

# bindd = CTRLALT, S, $d launch Spotify, exec, spotify --force-device-scale-factor=1.5
bindd = CTRLALT, P, $d launch KeepassXC, exec, env QT_QPA_PLATFORM=wayland XCURSOR_SIZE=20 QT_SCALE_FACTOR=1 keepassxc
bindd = CTRLALT, K, $d launch KeepassXC in vicinae, exec, vicinae close || vicinae vicinae://launch/@system7/store.vicinae.keepassxc/search
bindd = CTRLALT, F, $d launch Fsearch,exec, fsearch
bindd = CTRLALT, O, $d launch Gemini, exec, google-chrome-stable --profile-directory="Default" --app="https://gemini.google.com/app" # Perplexity
bindd = $mainMod, R, $d launch Reddit, exec, google-chrome-stable --profile-directory="Default" --app="https://www.reddit.com/"
# bindd = $mainMod, T, $d launch Pornhub, exec, google-chrome-stable --incognito --profile-direcotry="Default" --app="https://www.pornhub.com/"
bindd = $mainMod CTRL SHIFT, B, $d launch Incognito Tab, exec, google-chrome-stable --incognito --profile-directory="Default"
bindd = $mainMod CTRL, M, $d launch scrcpy, exec, scrcpy
bindd = $mainMod CTRL SHIFT, M, $d launch scrcpy in wireless mode, exec, adb tcpip 5555 && adb connect 192.168.1.3:5555 && scrcpy
bindd = $mainMod CTRL, equal, $d calculator, exec, qalculate-gtk

$d=[$l|Rofi menus]
$rofi-launch=$scrPath/rofilaunch.sh
# bindd = ALT, SPACE, $d application finder, exec, pkill -x rofi -drun
# bindd = $mainMod, SPACE, $d application finder , exec, pkill -x rofi || $rofi-launch d
bindd = ALT, SPACE, $d Vicinae, exec, vicinae toggle
# Change your bind to pass a custom class name, e.g., "rofi-launcher"
# bind = ALT, SPACE, exec, pkill -x rofi || rofi -show drun -class rofi-launcher
# bindd = $mainMod, TAB, $d window switcher , exec, pkill -x rofi || $rofi-launch w
bindd = $mainMod CTRL, TAB, $d window switcher , exec,vicinae close || vicinae vicinae://launch/wm/switch-windows
# bindd = $mainMod SHIFT, TAB, $d workspaces preview , exec, qs ipc -c overview call overview toggle
# bindd = $mainMod Shift, E, $d file finder , exec, pkill -x rofi || $rofi-launch f
bindd = $mainMod SHIFT, E, file finder, exec, kitty $SHELL -ic "env TERM=xterm-256color yazi"
# bindd = $mainMod, slash, $d keybindings hint, exec, pkill -x rofi || $scrPath/keybinds_hint.sh c # launch keybinds hint
bindd = $mainMod, slash, $d keybindings hint, exec, vicinae close || vicinae vicinae://launch/@sovereign/store.vicinae.hypr-keybinds/hyprland-keybinds
# bindd = $mainMod, period, $d emoji  picker , exec, pkill -x rofi || $scrPath/emoji-picker.sh # launch emoji picker
bindd = $mainMod, period, $d emoji  picker , exec, vicinae close || vicinae vicinae://launch/core/search-emojis
# bindd = $mainMod, comma, $d glyph picker , exec, pkill -x rofi || $scrPath/glyph-picker.sh # launch glyph picker
bindd = $mainMod, comma, $d glyph picker , exec, vicinae close ||  vicinae vicinae://launch/@fbosch/store.vicinae.nerdfont-search/nerdfonts-search
# bindd = $mainMod, V, $d clipboard ,  exec, pkill -x rofi || $scrPath/cliphist.sh -c # launch clipboard,
bindd = $mainMod, V, $d clipboard ,  exec,  vicinae close || vicinae vicinae://launch/clipboard/history || vicinae toggle
# bindd = $mainMod Shift, V, $d clipboard manager , exec, pkill -x rofi || $scrPath/cliphist.sh # launch clipboard Manager
# bindd = $mainMod Shift, A, $d select rofi launcher , exec, pkill -x rofi || $scrPath/rofiselect.sh # launch select menu
bindd = $mainMod, XF86Favorites, $d favorite command modifier, exec, kitty --class float_term -e "$HOME/.local/bin/favkey_modifier.sh"


$hc=Hardware Controls
$d=[$hc|Audio]
# binddl  = , F10, $d toggle mute output , exec, $scrPath/volumecontrol.sh -o m # toggle audio mute
binddl  = , XF86AudioMute,$d  toggle mute output, exec, $scrPath/volumecontrol.sh -o m # toggle audio mute
# binddel = , F11, $d decrease volume , exec, $scrPath/volumecontrol.sh -o d # decrease volume
# binddel = , F12, $d increase volume , exec, $scrPath/volumecontrol.sh -o i # increase volume
binddl  = , XF86AudioMicMute,$d un/mute microphone  , exec, $scrPath/volumecontrol.sh -i m # toggle microphone mute
binddel = , XF86AudioLowerVolume, $d decrease volume , exec, $scrPath/volumecontrol.sh -o d # decrease volume
binddel = , XF86AudioRaiseVolume, $d increase volume , exec, $scrPath/volumecontrol.sh -o i # increase volume


$d=[$hc|Media]
binddl  = , XF86AudioPlay,$d play media, exec, playerctl play-pause # toggle between media play and pause
binddl  = , XF86AudioPause,$d pause media, exec, playerctl play-pause # toggle between media play and pause
binddl  = , XF86AudioNext,$d next media  , exec, playerctl next # media next
binddl  = , XF86AudioPrev,$d  previous media , exec, playerctl previous # media previous

$d=[$hc|Brightness]
binddel = , XF86MonBrightnessUp, $d increase brightness , exec, $scrPath/brightnesscontrol.sh i # increase brightness
binddel = , XF86MonBrightnessDown, $d decrease brightness , exec, $scrPath/brightnesscontrol.sh d # decrease brightness

$d=[$hc|Others]
binddel = , XF86TouchpadToggle, $d toggle touchpad, exec, /home/binaryraptor/.local/bin/touchpad-toggle.sh #toggles touchpad
binddel = , XF86Favorites, $d run favorite command , exec, kitty --title "Java REPL" jshell
binddel = , XF86Favorites SHIFT, $d favorite command modifier, exec, kitty --class float_term -e /home/binaryraptor/.local/bin/favkey_modifier.sh
bindd = $mainMod, P, $d open monitor configs, exec, pkill -x nwg-displays || nwg-displays
bindd = $mainMod, Insert, $d open on-screen keyboard, exec, pkill -x wvkbd-deskintl || wvkbd-deskintl -L 300

$ut=Utilities
$d=[$ut]
# binddl = $mainMod, Space, $d toggle keyboard layout , exec, $scrPath/keyboardswitch.sh # switch keyboard layout
bindd = $mainMod Alt, G, $d game mode , exec, $scrPath/gamemode.sh # disable hypr effects for gamemode
bindd = $mainMod Shift, G, $d open game launcher , exec, $scrPath/gamelauncher.sh # run game launcher for steam and lutris
# bindd = $mainMod Alt, mouse_down, $d zoom out of screen, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.25')
# bindd = $mainMod Alt, mouse_up, $d zoom in on screen, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float / 2) | if . < 1 then 1 else . end')

$d=[$ut|Screen Capture]
bindd = $mainMod SHIFT, P, $d color picker, exec, hyprpicker -an # Pick color (Hex) >> clipboard#
bindd = $mainMod CTRL SHIFT, S, $d snip screen , exec, $scrPath/screenshot.sh s # partial screenshot capture
bindd = $mainMod SHIFT, escape, $d snip region to clipboard (frozen), exec, sh -c 'grimblast --freeze copy area && notify-send "Screenshot" "Copied to clipboard"'
bindd = $mainMod SHIFT, A, $d snip region and save to file (frozen), exec, sh -c 'DIR="$HOME/Pictures/Screenshots"; mkdir -p "$DIR"; FILE="$DIR/$(date +%Y-%m-%d_%H-%M-%S).png"; grimblast --freeze copysave area "$FILE" && notify-send "Screenshot" "Saved: $FILE"'
bindd = $mainMod Shift, S, $d freeze and snip screen, exec, $scrPath/screenshot.sh sf # partial screenshot capture (frozen screen)
binddl = $mainMod Alt, P, $d print monitor , exec, $scrPath/screenshot.sh m # monitor screenshot capture
binddl = , Print, $d print all monitors , exec, $scrPath/screenshot.sh p # all monitors screenshot capture


$rice=Theming and Wallpaper
$d=[$rice]
# bindd = $mainMod CTRL, W, $d select a global wallpaper , exec, pkill -x rofi || $scrPath/wallpaper.sh -SG # launch wallpaper select menu
# bindd = $mainMod Shift, R, $d wallbash mode selector , exec, pkill -x rofi || $scrPath/wallbashtoggle.sh -m # launch wallbash mode select menu
# bindd = $mainMod CTRL, T, $d select a theme, exec, pkill -x rofi || $scrPath/themeselect.sh # launch theme select menu
# bindd = $mainMod+Shift, Y, $d select animations, exec, pkill -x rofi || $scrPath/animations.sh --select # launch animations select menu
# bindd = $mainMod+Shift, U, $d select hyprlock layout, exec, pkill -x rofi || $scrPath/hyprlock.sh --select # launch hyprlock layout select menu
# bindd = $mainMod Shift, F3, $d select a global shader , exec, pkill -x rofi || $scrPath/shaders.sh --select # launch shaders select menu
# bindd = $mainMod Shift, O, $d select a workflow, exec, pkill -x rofi || $scrPath/workflows.sh --select # launch waybar layout select menu
# bindd = $mainMod Shift, I, $d select a waybar layout, exec, hyde-shell waybar -S # launch waybar layout select menu
# bindd = $mainMod Shift, I, $d select a waybar layout, exec, pkill -x rofi || $scrPath/waybar.sh --select # launch waybar layout select menu
bindd = $mainMod Alt, Up, $d next waybar layout , exec, $scrPath/wbarconfgen.sh n # next waybar mode
bindd = $mainMod Alt, Down, $d previous waybar layout , exec, $scrPath/wbarconfgen.sh p # previous waybar mode
bindd = $mainMod Alt, Right, $d next global wallpaper , exec, $scrPath/wallpaper.sh -Gn # next global wallpaper
bindd = $mainMod Alt, Left, $d previous global wallpaper , exec, $scrPath/wallpaper.sh -Gp # previous global wallpaper
bindd = $mainMod Shift, F2, $d toggle blur, exec, toggle-blur-persist.sh


$ws=Workspaces
$d=[$ws|Navigation]
bindd = $mainMod, 1, $d navigate to workspace 1 , workspace, 1
bindd = $mainMod, 2, $d navigate to workspace 2 , workspace, 2
bindd = $mainMod, 3, $d navigate to workspace 3 , workspace, 3
bindd = $mainMod, 4, $d navigate to workspace 4 , workspace, 4
bindd = $mainMod, 5, $d navigate to workspace 5 , workspace, 5
bindd = $mainMod, 6, $d navigate to workspace 6 , workspace, 6
bindd = $mainMod, 7, $d navigate to workspace 7 , workspace, 7
bindd = $mainMod, 8, $d navigate to workspace 8 , workspace, 8
bindd = $mainMod, 9, $d navigate to workspace 9 , workspace, 9
bindd = $mainMod, 0, $d navigate to workspace 10 , workspace, 10

$d=[$ws|Navigation|Relative workspace]
bindd = $mainMod Control, J, $d change active workspace forwards  , workspace, r+1
bindd = $mainMod Control, K, $d change active workspace backwards , workspace, r-1
bindd = $mainMod Control+Alt+Shift, J, Move focused window to nearest empty workspace, movetoworkspace, empty

$d=[$ws|Navigation]
bindd = $mainMod Control+Alt, J, $d navigate to the nearest empty workspace , workspace, empty

# Move focused window to a workspace
$d=[$ws|Move window to workspace]
bindd = $mainMod Shift, 1, $d move to workspace 1 , movetoworkspace, 1
bindd = $mainMod Shift, 2, $d move to workspace 2 , movetoworkspace, 2
bindd = $mainMod Shift, 3, $d move to workspace 3 , movetoworkspace, 3
bindd = $mainMod Shift, 4, $d move to workspace 4 , movetoworkspace, 4
bindd = $mainMod Shift, 5, $d move to workspace 5 , movetoworkspace, 5
bindd = $mainMod Shift, 6, $d move to workspace 6 , movetoworkspace, 6
bindd = $mainMod Shift, 7, $d move to workspace 7 , movetoworkspace, 7
bindd = $mainMod Shift, 8, $d move to workspace 8 , movetoworkspace, 8
bindd = $mainMod Shift, 9, $d move to workspace 9 , movetoworkspace, 9
bindd = $mainMod Shift, 0, $d move to workspace 10 , movetoworkspace, 10

# Move focused window to a relative workspace
$d=[$ws]
bindd = $mainMod Control+Shift, K, $d move window to previous relative workspace , movetoworkspace, r-1
bindd = $mainMod Control+Shift, J, $d move window to next relative workspace , movetoworkspace, r+1

# Scroll through existing workspaces
$d=[$ws|Navigation]
bindd = $mainMod, mouse_down, $d next workspace, workspace, e+1
bindd = $mainMod, mouse_up, $d previous workspace, workspace, e-1

# Move/Switch to special workspace (scratchpad)
$d=[$ws|Navigation|Special workspace]
bindd = $mainMod Alt Shift, S, $d move to scratchpad  , movetoworkspace, special
bindd = $mainMod Alt, S, $d move to scratchpad (silent) , movetoworkspacesilent, special
bindd = $mainMod, S, $d toggle scratchpad ,  togglespecialworkspace
# Apps in Special workspace
bindd = $mainMod, M, $d toggle spotify, togglespecialworkspace, spotify
bindd = $mainMod ALT, Z, $d toggle zapzap, togglespecialworkspace, zapzap
bindd = $mainMod, grave, $d toggle spotify, togglespecialworkspace, sp
bindd = $mainMod ALT, D, $d toggle discord, togglespecialworkspace, discord
bindd = $mainMod, O, $d toggle AI, togglespecialworkspace, AI
bindd = $mainMod, Y, $d toggle thunderbird mail,  togglespecialworkspace, mail
bindd = $mainMod SHIFT, M, $d toggle scrcpy workspace, togglespecialworkspace, scrcpy
# Move focused window to a workspace silently
$d=[$ws|Navigation|Move window silently]
bindd = $mainMod Alt, 1, $d move to workspace 1  (silent), movetoworkspacesilent, 1
bindd = $mainMod Alt, 2, $d move to workspace 2  (silent), movetoworkspacesilent, 2
bindd = $mainMod Alt, 3, $d move to workspace 3  (silent), movetoworkspacesilent, 3
bindd = $mainMod Alt, 4, $d move to workspace 4  (silent), movetoworkspacesilent, 4
bindd = $mainMod Alt, 5, $d move to workspace 5  (silent), movetoworkspacesilent, 5
bindd = $mainMod Alt, 6, $d move to workspace 6  (silent), movetoworkspacesilent, 6
bindd = $mainMod Alt, 7, $d move to workspace 7  (silent), movetoworkspacesilent, 7
bindd = $mainMod Alt, 8, $d move to workspace 8  (silent), movetoworkspacesilent, 8
bindd = $mainMod Alt, 9, $d move to workspace 9  (silent), movetoworkspacesilent, 9
bindd = $mainMod Alt, 0, $d move to workspace 10 (silent), movetoworkspacesilent, 10


$wb=Waybar
$d=[$wb]
bindd = $mainMod Alt, grave, $d toggle waybar, exec, killall -SIGUSR1 waybar
bindd = $mainMod ALT SHIFT, grave, $d toggle waybar and reload config, exec, hyde-shell waybar --hide
bindd = $mainMod, N, $d reload waybar, exec, hyde-shell waybar

# Notification section of waybar
$d=[$wb|Notifications]
bindd = $mainMod SHIFT, N, $d toggle DND,exec, swaync-client -d
# bind = SUPER ALT, N, exec, qs ipc call notifications dismiss_all
# bind = SUPER SHIFT, N, exec, qs ipc call notifications dnd_toggle
bind = $mainMod, A,exec, swaync-client --toggle-panel
# bindd = $mainMod SHIFT, N, $d Toggle DND,exec, swaync-client -d

$wf= Custom
bindd = CTRL ALT SHIFT, P, $d Type Vault Password, exec, "$HOME/.local/bin/unlock_vault.sh"

$d=#! unset the group name
