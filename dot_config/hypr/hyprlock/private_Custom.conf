$fontFamily = SF Pro Display
$fn_greet=echo "Good $(date +%H | awk '{if ($1 < 12) print "Morning"; else if ($1 < 18) print "Afternoon"; else print "Evening"}'), ${USER}"
general {
    # ignore_empty_input = true
    # immediate_render = true
}

auth {
    fingerprint:enabled = true
    fingerprint:ready_message =    󰈷  Scan To Unlock
    fingerprint:present_message = 󱜙  Scanning...
}
label {
    monitor =
    text = $FPRINTPROMPT
    color = rgba(255, 255, 255, 0.3)
    font_size = 16
    font_family = SF Pro Display
    position = 0, -410
    halign = center
    valign = center
}

animations {
    # enabled = false
    # bezier = mycurve, 0.05, 0.9, 0.1, 1.05
    # animation = fadeIn, 1, 1.0, default
    # animation = inputFieldFade, 1, 0.5, mycurve
}

general {
    # no_fade_in = false
    # grace = 0
    # disable_loading_bar = false
}

background {
    monitor =
    path = $BACKGROUND_PATH
    blur_size = 8
    blur_passes = 3
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
    vibrancy = 0.3
    vibrancy_darkness = 0.2
}


# Current time
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $wallbash_2xa7_rgba
    font_size = 180
    font_family = $fontFamily Medium 10
    position = 0, 180
    halign = center
    valign = center
}
