#INPUT FIELD
input-field {
    size = 230, 50 #!
    outline_thickness = 3
    dots_size = 0.30 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.14 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = $wallbash_pry2_rgba
    inner_color = $wallbash_pry3_rgba
    font_color = $color7
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = $wallbash_pry4_rgba
    fail_color = rgba(FF0000FF) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = true # see below
    position = 0, 100
    halign = center
    valign = bottom
}

# Battery Status if present
label {
    monitor =
    text = cmd[update:5000] $BATTERY_ICON
    color = $wallbash_4xa9_rgba
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = -1%, 1%
    halign = right
    valign = bottom
}
#
# USER Greeting
label {
    monitor =
    text = cmd[update:60000] $fn_greet
    # color = $wallbash_2xa9_rgba
    color = rgba(255, 255, 255, 0.8)
    font_size = 17
    font_family = SF Pro Display
    position = 0, 270
    halign = center
    valign = bottom
}
label {
    monitor =
    text = cmd[update:1000] $SPLASH_CMD # Outputs the song title when mpris is available, otherwise, it will output the splash command.
    color = $wallbash_txt2_rgba
    font_family = SF Pro Display
    font_size = 16
    position = 0, -210
    halign = center
    valign = top
}

$LAST_PLAYER="$(playerctl -l | tail -n1)"
# Next button
label {
    monitor =
    text = cmd[update:1000] { playerctl status -p $LAST_PLAYER | grep -q "Playing" ;} && echo "󰒭"
    onclick = playerctl -p $LAST_PLAYER next
    color = $text
    font_size = 20
    font_family = SF Pro Display
    position = 2%, -241
    halign = center
    valign = top
}

# Prev button
label {
    monitor =
    text = cmd[update:1000] { playerctl status -p $LAST_PLAYER | grep -q "Playing" ;} && echo "󰒮"
    onclick = playerctl -p $LAST_PLAYER previous && pkill -u $USER -SIGUSR2 hyprlock
    color = $text
    font_size = 20
    font_family = SF Pro Display
    position = -2%, -241
    halign = center
    valign = top
}

# Play/Pause button
label {
    monitor =
    text = cmd[update:1000] player=$LAST_PLAYER; [ -z "$player" ] && echo "" || (playerctl status -p "$player" 2>/dev/null | grep -q '^Playing$' && echo "⏸" || echo "▶")
    onclick = playerctl -p $LAST_PLAYER play-pause
    color = $text
    font_size = 20
    font_family = SF Pro Display
    position = 0, -240
    halign = center
    valign = top
}
